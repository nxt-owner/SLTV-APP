<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLTV – Live Channel Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.ui.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/controls.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <!-- === PLAYER SECTION === -->
        <div class="player-section">
            <div class="video-wrapper" data-shaka-player-container>
                <video data-shaka-player id="video" autoplay playsinline></video>

                <!-- === LOADING SPINNER === -->
                <div id="loadingSpinner" class="loading-spinner"></div>

                <!-- === WATERMARK (bottom-left, clickable) === -->
                <div class="watermark">
                    <a>
                        <img src="https://raw.githubusercontent.com/nxt-owner/SLTV-APP/refs/heads/main/images/logo/logo.png"
                            alt="Watermark Logo">
                    </a>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search channels..." autocomplete="off">
            </div>
        </div>

        <!-- === CHANNEL GRID (populated by JS) === -->
        <div class="channels-container" id="channelsContainer"></div>
    </div>
    <script src="script.js"></script>

    <!-- === TELEGRAM POPUP === -->
    <div id="telegramPopup" class="popup-overlay">
        <div class="popup-content">
            <div class="popup-header">
                <h3>Join Our Community</h3>
                <span class="close-btn" id="closePopup">&times;</span>
            </div>
            <p>Stay updated with the latest channels and news!</p>
            <a href="https://t.me/sltvapp" target="_blank" id="joinTelegramBtn" class="join-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path
                        d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161c-.18 1.897-.962 6.502-1.359 8.627-.168.9-.5 1.201-.82 1.23-.697.064-1.226-.461-1.901-.903-1.056-.692-1.653-1.123-2.678-1.799-1.185-.781-.417-1.21.258-1.911.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.139-5.062 3.345-.479.329-.913.489-1.302.481-.428-.008-1.252-.241-1.865-.44-.751-.244-1.349-.374-1.297-.789.027-.216.324-.437.893-.663 3.498-1.524 5.831-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.477-1.635.099-.002.321.023.465.141.119.098.152.228.166.331.016.117.028.238.025.336z" />
                </svg>
                Join Telegram Channel
            </a>
        </div>
    </div>

</body>

</html>
